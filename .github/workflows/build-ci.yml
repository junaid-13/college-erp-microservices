name: Building-on-push

on:
  push:
    branches:
      - "feat/**"
      - "dev/**"
jobs:
  format:
    runs-on: ubuntu-latest

    outputs:
      formatted: ${{ steps.prettier.outcome == 'failure' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.MERN_ERP_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check formatting
        id: prettier
        continue-on-error: true
        run: npx prettier --check .

      - name: Asking to fix the prettier issues
        if: steps.prettier.outcome == 'failure'
        run: echo "Please run 'npx prettier --write .' to fix formatting issues."


  quality:
    needs: format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.MERN_ERP_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      - name: Lint code
        run: npm run lint

  build:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.MERN_ERP_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
