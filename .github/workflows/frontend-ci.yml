name: CI-feature
on:
  push:
    branches:
      - "feat/**"
jobs:
  Linting:
    runs-on: ubuntu-latest
    steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                token: ${{ secrets.MERN_ERP_TOKEN }}
                ref: ${{ github.ref_name}}
                fetch-depth: 0
            - name: setup Nodejs
              uses: actions/setup-node@v5
              with:
                node-version: "24"
                cache: npm
            - run: npm ci

            - name: Linting
              run: |
                npx eslint . -f html -o eslint-report${{ github.workflow }}

            - name: Upload eslint report
              uses: actions/upload-artifact@v4
              with: 
                name: eslint-report${{ github.workflow_sha}}
                path: eslint-report${{ github.workflow }}
