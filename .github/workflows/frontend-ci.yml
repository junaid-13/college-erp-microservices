name: CI-feature

on:
  push:
    branches:
      - "feat/**"
  pull_request:
    branches:
      - dev

jobs:
  Linting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.MERN_ERP_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          npx eslint . -f html -o eslint-report-${{ github.workflow }}.html
          npx eslint . -f json -o eslint-report.json

          ERROR_COUNT=$(jq '[.[].errorCount] | add' eslint-report.json)
          WARNING_COUNT=$(jq '[.[].warningCount] | add' eslint-report.json)

          echo "Errors: $ERROR_COUNT"
          echo "Warnings: $WARNING_COUNT"

          echo "errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT

          if [ "$ERROR_COUNT" -gt 0 ] || [ "$WARNING_COUNT" -gt 0 ]; then
            exit 1
          fi

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report-${{ github.run_id }}
          path: |
            eslint-report-${{ github.workflow }}.html

  Formatting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.MERN_ERP_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier . --check
