  Formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.MERN_ERP_TOKEN }}
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci

      - name: Check formatting
        run: npx prettier . --check
